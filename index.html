<!DOCTYPE html>
<html>
<head>
    <!-- 1. The name shown on the browser tab -->
    <title>DGW Official App</title>

    <!-- 2. The name shown when link is scanned or shared in chat apps -->
    <meta property="og:title" content="DGW Official App" />
    <meta property="og:site_name" content="PT Delta Giri Wacana" />
    <meta property="og:description" content="Official Download Page for DGW Mobile Application" />
    
    <!-- 3. iOS App Banner Title -->
    <meta name="apple-mobile-web-app-title" content="DGW App" />

    <script>
        window.onload = function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            var androidUrl = "https://play.google.com/store/apps/details?id=com.pt_dgw.dgw&pcampaignid=web_share";
            var iosUrl = "https://apps.apple.com/us/app/dgw-solution/id6737177527"; 

            if (/android/i.test(userAgent)) {
                window.location.href = androidUrl;
            } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = iosUrl;
            } else {
                document.getElementById("manual-links").style.display = "block";
            }
        };
    </script>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">
    <h2>Redirecting to DGW App...</h2>
    <div id="manual-links" style="display:none;">
        <p><a href="https://play.google.com/store/apps/details?id=com.pt_dgw.dgw&pcampaignid=web_share">Download for Android (Google Play)</a></p>
        <p><a href="https://apps.apple.com/us/app/dgw-solution/id6737177527">Download for iOS (App Store)</a></p>
    </div>
</body>
</html>
